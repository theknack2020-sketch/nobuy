name: NoBuy
options:
  bundleIdPrefix: com.ufukozdemir
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.3"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en
  knownRegions:
    - en
    - tr

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 99H9NJ6Z6J
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "4"

targets:
  NoBuy:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: Resources
        buildPhase: resources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: NoBuy
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - nobuy
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ufukozdemir.nobuy
        TARGETED_DEVICE_FAMILY: "1"
    entitlements:
      path: Sources/NoBuy.entitlements
      properties:
        com.apple.security.app-sandbox: true

  NoBuyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: NoBuy

  NoBuyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: NoBuy

schemes:
  NoBuy:
    build:
      targets:
        NoBuy: all
        NoBuyTests: [test]
        NoBuyUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Sources/NoBuy.storekit
    test:
      targets:
        - NoBuyTests
        - NoBuyUITests
      storeKitConfiguration: Sources/NoBuy.storekit
